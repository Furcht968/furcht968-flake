"$schema" = 'https://starship.rs/config-schema.json'

format = """$username\
[](bg:#444444 fg:#585858)\
$hostname\
[](bg:#FFA000 fg:#444444)\
$directory\
[](fg:#FFA000 bg:#005EFF)\
$git_branch\
[](fg:#005EFF bg:#002F80)\
$git_status\
[](fg:#002F80 bg:#303030)\
[ % ](bg:#303030 fg:#F7F7F7)\
[](fg:#303030)\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like   or disable this
# and use the os module below
[username]
show_always = true
style_user = "bg:#585858 fg:#BBBBBB"
style_root = "bg:#585858 fg:#BBBBBB"
format = '[ $user ]($style)'

# An alternative to the username module which displays a symbol that
# represents the current operating system
[hostname]
ssh_only = false
style = "bg:#444444"
format = '[$ssh_symbol]($style)[ $hostname ]($style)'

[directory]
style = "bg:#FFA000 fg:#F0F0F0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
style = "bg:#005EFF fg:#F0F0F0"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#002F80 fg:#F0F0F0"
format = '[ $all_status$ahead_behind ]($style)'
