"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](#585858)\
$username\
[](bg:#444444 fg:#585858)\
$hostname\
[](bg:#0087AF fg:#444444)\
$directory\
[](fg:#0087AF bg:#AFD700)\
$git_branch\
$git_status\
[](fg:#AFD700 bg:#303030)\
$shell\
[](fg:#303030)\
"""

# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like   or disable this
# and use the os module below
[username]
show_always = true
style_user = "bg:#585858 fg:#BBBBBB"
style_root = "bg:#585858 fg:#BBBBBB"
format = '[$user ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[hostname]
show_always = true
style = "bg:#444444 fg:#BBBBBB"
format = '[$hostname ]($style)'
disabled = false

[directory]
style = "bg:#0087AF fg:#FFFFFF"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[git_branch]
style = "bg:#AFD700"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#AFD700"
format = '[$all_status$ahead_behind ]($style)'

[shell]
style = "bg:#303030 fg:#F7F7F7"
bash_indicatior = "$"
zsh_indicatior = "%"
